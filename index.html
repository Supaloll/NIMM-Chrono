<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NIMM Chrono</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#14181c">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NIMM Chrono">
<style>
  :root {
    --bg: #14181c;
    --panel: #1d2329;
    --panel-light: #262e36;
    --text: #f2f0e8;
    --text-dim: #9aa3ad;
    --accent: #ff8c3c;
    --accent-dim: #5a3c20;
    --go: #4caf6e;
    --pause: #e0b13c;
    --stop: #d9534f;
    --border: #313a42;
    font-size: 16px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    padding: 0 0 40px 0;
  }
  header {
    padding: 24px 20px 12px;
    text-align: center;
    position: relative;
  }
  header h1 {
    margin: 0;
    font-size: 1.5rem;
    letter-spacing: 0.04em;
    font-weight: 700;
  }
  header h1 span { color: var(--accent); }
  .btn-settings {
    position: absolute;
    top: 18px;
    right: 16px;
    background: transparent;
    color: var(--text-dim);
    font-size: 1.3rem;
    padding: 8px 10px;
    border-radius: 10px;
  }
  .settings-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }
  .settings-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px;
    width: 100%;
    max-width: 400px;
  }
  .settings-panel label {
    display: block;
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .settings-hint {
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-top: 8px;
  }
  .btn-settings-save { background: var(--go); width: 100%; margin-top: 16px; }
  .btn-settings-close { background: var(--panel-light); border: 1px solid var(--border); width: 100%; margin-top: 8px; }
  main { max-width: 480px; margin: 0 auto; padding: 0 16px; }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .tour-field label {
    display: block;
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .tour-input-row { display: flex; gap: 8px; }
  input[type="text"] {
    flex: 1;
    background: var(--panel-light);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 1.1rem;
    padding: 14px 14px;
    border-radius: 12px;
    outline: none;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .suggestion-chip {
    background: var(--panel-light);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 0.85rem;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
  }
  .suggestion-chip:active { background: var(--accent-dim); color: var(--text); }
  .clock-display { text-align: center; padding: 28px 0 8px; }
  .clock-time {
    font-size: 3.2rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  .clock-status { margin-top: 6px; font-size: 0.95rem; color: var(--text-dim); }
  .clock-status.running { color: var(--go); }
  .clock-status.paused { color: var(--pause); }
  .current-tour-name {
    font-size: 1.7rem;
    font-weight: 700;
    color: var(--accent);
    margin-top: 4px;
    margin-bottom: 8px;
    min-height: 1.3em;
    line-height: 1.25;
  }
  .pause-time {
    margin-top: 10px;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--pause);
    font-variant-numeric: tabular-nums;
  }
  .switch-field { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
  .switch-field label {
    display: block;
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .btn-confirm-switch { background: var(--accent); padding: 14px 18px; border-radius: 12px; white-space: nowrap; }
  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
  button {
    font-family: inherit;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 14px;
    padding: 18px 12px;
    cursor: pointer;
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.05s ease, opacity 0.15s ease;
  }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-start { background: var(--go); grid-column: span 2; font-size: 1.15rem; padding: 20px 12px; }
  .btn-pause { background: var(--pause); color: #2a2410; }
  .btn-switch { background: var(--panel-light); border: 1px solid var(--border); }
  .btn-stop { background: var(--stop); }
  .hidden { display: none !important; }
  .quota-numbers { display: flex; align-items: baseline; gap: 6px; font-variant-numeric: tabular-nums; }
  .quota-done { font-size: 1.8rem; font-weight: 700; color: var(--go); }
  .quota-numbers.over .quota-done { color: var(--stop); }
  .quota-sep { font-size: 1.2rem; color: var(--text-dim); }
  .quota-max { font-size: 1.2rem; color: var(--text-dim); }
  .quota-bar-track { margin-top: 12px; height: 14px; background: var(--panel-light); border-radius: 999px; overflow: hidden; }
  .quota-bar-fill { height: 100%; background: var(--go); border-radius: 999px; transition: width 0.3s ease, background 0.3s ease; }
  .quota-bar-fill.over { background: var(--stop); }
  .quota-message { margin-top: 10px; font-size: 0.9rem; color: var(--text-dim); }
  .quota-message.over { color: var(--stop); font-weight: 600; }
  .btn-ai-message { background: var(--panel-light); border: 1px solid var(--border); width: 100%; margin-top: 16px; }
  .ai-message-zone { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .ai-message-status { font-size: 0.85rem; color: var(--text-dim); min-height: 1.2em; }
  .ai-message-textarea { width: 100%; background: var(--panel-light); border: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: 1rem; padding: 12px; border-radius: 12px; margin-top: 8px; resize: vertical; }
  .btn-copy-message { background: var(--accent); width: 100%; margin-top: 10px; }
  .ai-message-actions { display: flex; gap: 8px; margin-top: 10px; }
  .ai-message-actions.hidden { display: none; }
  .btn-regenerate-message { background: var(--panel-light); border: 1px solid var(--border); flex: 1; font-size: 0.9rem; padding: 12px; }
  .btn-close-message { background: var(--panel-light); border: 1px solid var(--border); flex: 1; font-size: 0.9rem; padding: 12px; }
  .btn-assistant { background: var(--accent-dim); border: 1px solid var(--accent); color: var(--text); width: 100%; margin-top: 12px; font-size: 1rem; padding: 16px 12px; }
  .assistant-modal {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    display: flex;
    flex-direction: column;
  }
  .assistant-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .assistant-header h2 {
    margin: 0;
    font-size: 1.1rem;
    font-weight: 700;
  }
  .assistant-header-actions { display: flex; gap: 8px; }
  .btn-assistant-reset, .btn-assistant-close {
    background: var(--panel-light);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 0.85rem;
    padding: 8px 12px;
    border-radius: 10px;
  }
  .assistant-contact-tabs {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .assistant-contact-tab {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 0.9rem;
    padding: 10px 12px;
    border-radius: 12px;
  }
  .assistant-contact-tab.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--text);
  }
  .assistant-chat-zone {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .assistant-msg-time {
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-top: 4px;
  }
  .assistant-msg.from-user .assistant-msg-time { text-align: right; }
  .assistant-msg.from-bot .assistant-msg-time { text-align: left; }
  .assistant-msg {
    max-width: 85%;
    padding: 12px 14px;
    border-radius: 16px;
    font-size: 0.95rem;
    line-height: 1.4;
    white-space: pre-wrap;
  }
  .assistant-msg.from-user {
    background: var(--accent-dim);
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .assistant-msg.from-bot {
    background: var(--panel);
    border: 1px solid var(--border);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .assistant-msg.from-bot.is-error {
    border-color: var(--stop);
    color: var(--stop);
  }
  .assistant-input-zone {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg);
  }
  .assistant-input-zone textarea {
    flex: 1;
    background: var(--panel-light);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 1rem;
    padding: 12px 14px;
    border-radius: 14px;
    outline: none;
    resize: none;
    max-height: 100px;
  }
  .assistant-input-zone textarea:focus { border-color: var(--accent); }
  .btn-assistant-send {
    background: var(--go);
    border-radius: 14px;
    padding: 0 18px;
    flex-shrink: 0;
  }
  .btn-assistant-send:disabled { opacity: 0.4; }
  .card-title { font-size: 1rem; color: var(--text-dim); margin: 0 0 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .day-block { margin-bottom: 18px; }
  .day-block:last-child { margin-bottom: 0; }
  .day-header { display: flex; justify-content: space-between; align-items: baseline; padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
  .day-name { font-weight: 700; font-size: 1rem; }
  .day-name .today-tag { color: var(--accent); font-size: 0.75rem; font-weight: 600; margin-left: 6px; text-transform: uppercase; }
  .day-total { font-weight: 700; font-size: 1rem; font-variant-numeric: tabular-nums; color: var(--go); }
  .session-row { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; font-size: 0.9rem; }
  .session-time { color: var(--text-dim); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .session-name { flex: 1; margin: 0 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .session-duration { font-variant-numeric: tabular-nums; color: var(--text-dim); white-space: nowrap; }
  .day-empty { color: var(--text-dim); font-size: 0.85rem; font-style: italic; padding: 4px 0; }
  .history-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0; }
  .history-header-row .card-title { margin: 0; }
  .btn-add-session { background: var(--panel-light); border: 1px solid var(--border); font-size: 0.8rem; padding: 8px 14px; border-radius: 10px; }
  .session-row { gap: 4px; }
  .session-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .session-action-btn { background: transparent; border: none; font-size: 0.95rem; padding: 4px 6px; border-radius: 8px; line-height: 1; }
  .session-action-btn:active { background: var(--panel-light); }
  .session-edit-form { background: var(--panel-light); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin: 8px 0; }
  .session-edit-form .field-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .session-edit-form label { display: block; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 4px; }
  .session-edit-form input[type="text"], .session-edit-form input[type="time"], .session-edit-form input[type="date"] { width: 100%; background: var(--panel); border: 1px solid var(--border); color: var(--text); font-size: 0.95rem; padding: 10px; border-radius: 10px; outline: none; }
  .session-edit-form .field-row > div { flex: 1; }
  .session-edit-form .edit-actions { display: flex; gap: 8px; margin-top: 10px; }
  .session-edit-form .edit-actions button { flex: 1; padding: 12px; font-size: 0.9rem; }
  .btn-edit-save { background: var(--go); }
  .btn-edit-cancel { background: var(--panel); border: 1px solid var(--border); }
  .btn-edit-error { color: var(--stop); font-size: 0.8rem; margin-top: 6px; }
  footer { text-align: center; color: var(--text-dim); font-size: 0.75rem; margin-top: 30px; padding: 0 20px; }
</style>
</head>
<body>
<header>
  <h1>NIMM <span>Chrono</span></h1>
  <button class="btn-settings" id="btnSettings" aria-label="Réglages">⚙</button>
</header>
<div class="settings-overlay hidden" id="settingsOverlay">
  <div class="settings-panel">
    <h2 class="card-title">Réglages</h2>
    <label for="apiKeyInput">Clé API Deepseek</label>
    <input type="text" id="apiKeyInput" placeholder="sk-..." autocomplete="off">
    <div class="settings-hint">Stockée uniquement sur ce téléphone.</div>
    <button class="btn-settings-save" id="btnSaveSettings">Enregistrer</button>
    <button class="btn-settings-close" id="btnCloseSettings">Fermer</button>
  </div>
</div>
<main>
  <div class="card">
    <div class="tour-field" id="tourInputZone">
      <label for="tourNameInput">Nom de la tournée</label>
      <div class="tour-input-row">
        <input type="text" id="tourNameInput" placeholder="ex: Poste Colmar Matin" autocomplete="off">
      </div>
      <div class="suggestions" id="suggestionsZone"></div>
    </div>
    <div class="clock-display">
      <div class="current-tour-name" id="currentTourName"></div>
      <div class="clock-time" id="clockTime">00:00:00</div>
      <div class="clock-status" id="clockStatus">Arrêté</div>
      <div class="pause-time hidden" id="pauseTimeZone">Pause : <span id="pauseTime">00:00</span></div>
    </div>
    <div class="switch-field hidden" id="switchInputZone">
      <label for="switchNameInput">Nouvelle tournée</label>
      <div class="tour-input-row">
        <input type="text" id="switchNameInput" placeholder="ex: Fret Allemagne" autocomplete="off">
        <button class="btn-confirm-switch" id="btnConfirmSwitch">OK</button>
      </div>
    </div>
    <div class="btn-grid">
      <button class="btn-start" id="btnStart">Démarrer</button>
      <button class="btn-pause hidden" id="btnPause">Pause</button>
      <button class="btn-switch hidden" id="btnSwitch">Changer de tournée</button>
      <button class="btn-stop hidden" id="btnStop" style="grid-column: span 2;">Terminer</button>
    </div>
  </div>
  <div class="card">
    <h2 class="card-title">Cette semaine</h2>
    <div class="quota-numbers">
      <span class="quota-done" id="quotaDone">0h00</span>
      <span class="quota-sep">/</span>
      <span class="quota-max">28h</span>
    </div>
    <div class="quota-bar-track">
      <div class="quota-bar-fill" id="quotaBarFill"></div>
    </div>
    <div class="quota-message" id="quotaMessage"></div>
    <button class="btn-ai-message" id="btnAiMessage">💬 Quota semaine</button>
    <div class="ai-message-zone hidden" id="aiMessageZone">
      <div class="ai-message-status" id="aiMessageStatus"></div>
      <textarea class="ai-message-textarea hidden" id="aiMessageTextarea" rows="3"></textarea>
      <button class="btn-copy-message hidden" id="btnCopyMessage">Copier le message</button>
      <div class="ai-message-actions hidden" id="aiMessageActions">
        <button class="btn-regenerate-message" id="btnRegenerateMessage">🔄 Régénérer</button>
        <button class="btn-close-message" id="btnCloseMessage">Fermer</button>
      </div>
    </div>
    <button class="btn-assistant" id="btnAssistant">🤖 Assistant</button>
  </div>
  <div class="card" id="historyCard">
    <div class="history-header-row">
      <h2 class="card-title">Historique</h2>
      <button class="btn-add-session" id="btnAddSession">+ Ajouter</button>
    </div>
    <div id="historyZone"></div>
  </div>
</main>
<div class="assistant-modal hidden" id="assistantModal">
  <div class="assistant-header">
    <h2>🤖 Assistant quota</h2>
    <div class="assistant-header-actions">
      <button class="btn-assistant-reset" id="btnAssistantReset">🗑️ Nouvelle conversation</button>
      <button class="btn-assistant-close" id="btnAssistantClose">✕</button>
    </div>
  </div>
  <div class="assistant-contact-tabs" id="assistantContactTabs">
    <button class="assistant-contact-tab" data-contact="amandine" id="tabAmandine">Amandine</button>
    <button class="assistant-contact-tab" data-contact="theo" id="tabTheo">Théo</button>
  </div>
  <div class="assistant-chat-zone" id="assistantChatZone"></div>
  <div class="assistant-input-zone">
    <textarea id="assistantInput" rows="1" placeholder="Décris la situation..."></textarea>
    <button class="btn-assistant-send" id="btnAssistantSend">➤</button>
  </div>
</div>
<footer>NIMM Chrono — tout reste sur ton téléphone.</footer>
<script>
(function() {
  "use strict";
  const STORAGE_KEY = "nimm_chrono_sessions";
  const TOURS_KEY = "nimm_chrono_known_tours";
  const API_KEY_STORAGE = "nimm_chrono_deepseek_key";
  function loadApiKey() { return localStorage.getItem(API_KEY_STORAGE) || ""; }
  function saveApiKey(key) { localStorage.setItem(API_KEY_STORAGE, key); }
  function loadSessions() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { return []; } }
  function saveSessions(sessions) { localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions)); }
  function deleteSession(id) {
    const sessions = loadSessions().filter((s) => s.id !== id);
    saveSessions(sessions);
  }
  function updateSession(id, newName, newStartMs, newEndMs) {
    const sessions = loadSessions();
    const idx = sessions.findIndex((s) => s.id === id);
    if (idx === -1) return;
    sessions[idx].tourName = newName;
    sessions[idx].start = newStartMs;
    sessions[idx].end = newEndMs;
    sessions[idx].durationMs = newEndMs - newStartMs;
    saveSessions(sessions);
  }
  function addManualSession(name, startMs, endMs) {
    const sessions = loadSessions();
    sessions.push({
      id: "s_" + Date.now() + "_" + Math.floor(Math.random() * 1000),
      tourName: name,
      start: startMs,
      end: endMs,
      durationMs: endMs - startMs
    });
    saveSessions(sessions);
  }
  let editingSessionId = null;
  function loadKnownTours() { try { return JSON.parse(localStorage.getItem(TOURS_KEY)) || []; } catch(e) { return []; } }
  function rememberTourName(name) {
    const tours = loadKnownTours();
    const idx = tours.indexOf(name);
    if (idx !== -1) tours.splice(idx, 1);
    tours.unshift(name);
    localStorage.setItem(TOURS_KEY, JSON.stringify(tours.slice(0, 12)));
  }
  const ASSISTANT_CONTACTS = ["amandine", "theo"];
  const ASSISTANT_CONTACT_LABELS = { amandine: "Amandine", theo: "Théo" };
  const ASSISTANT_ACTIVE_CONTACT_KEY = "nimm_chrono_assistant_active_contact";
  function assistantHistoryKey(contact) { return "nimm_chrono_assistant_history_" + contact; }
  function loadActiveContact() {
    const saved = localStorage.getItem(ASSISTANT_ACTIVE_CONTACT_KEY);
    return ASSISTANT_CONTACTS.indexOf(saved) !== -1 ? saved : "amandine";
  }
  function saveActiveContact(contact) { localStorage.setItem(ASSISTANT_ACTIVE_CONTACT_KEY, contact); }
  let assistantActiveContact = loadActiveContact();
  function loadAssistantHistory(contact) { try { return JSON.parse(localStorage.getItem(assistantHistoryKey(contact))) || []; } catch(e) { return []; } }
  function saveAssistantHistory(contact, history) { localStorage.setItem(assistantHistoryKey(contact), JSON.stringify(history)); }
  function addAssistantMessage(contact, role, content, isError) {
    const history = loadAssistantHistory(contact);
    const msg = { role: role, content: content, ts: Date.now() };
    if (isError) msg.isError = true;
    history.push(msg);
    saveAssistantHistory(contact, history);
    return history;
  }
  const CURRENT_KEY = "nimm_chrono_current_session";
  function loadCurrent() { try { return JSON.parse(localStorage.getItem(CURRENT_KEY)) || null; } catch(e) { return null; } }
  function saveCurrent(session) {
    if (session === null) localStorage.removeItem(CURRENT_KEY);
    else localStorage.setItem(CURRENT_KEY, JSON.stringify(session));
  }
  let current = loadCurrent();
  let tickInterval = null;
  const WEEKLY_QUOTA_MS = 28 * 60 * 60 * 1000;
  const tourInputZone = document.getElementById("tourInputZone");
  const tourNameInput = document.getElementById("tourNameInput");
  const suggestionsZone = document.getElementById("suggestionsZone");
  const currentTourName = document.getElementById("currentTourName");
  const clockTime = document.getElementById("clockTime");
  const clockStatus = document.getElementById("clockStatus");
  const btnStart = document.getElementById("btnStart");
  const btnPause = document.getElementById("btnPause");
  const btnSwitch = document.getElementById("btnSwitch");
  const btnStop = document.getElementById("btnStop");

    const m = Math.floor((s % 3600) / 60);

    return [h, m, sec].map(v => String(v).padStart(2, "0")).join(":");
  }
  function formatMS(totalSeconds) {
    const s = Math.max(0, Math.floor(totalSeconds));

      addAssistantMessage(assistantActiveContact, "assistant", "Erreur lors de la génération. Vérifie ta connexion ou ta clé API.", true);
    }
    renderAssistantChat();
    btnAssistantSend.disabled = false;
    assistantInput.focus();
  }
  function render() {
    if (!current) {
      tourInputZone.classList.remove("hidden");
      currentTourName.textContent = "";
      clockTime.textContent = "00:00:00";
      clockStatus.textContent = "Arrêté";
      clockStatus.className = "clock-status";
      btnStart.classList.remove("hidden");
      btnPause.classList.add("hidden");
      btnSwitch.classList.add("hidden");
      btnStop.classList.add("hidden");
    } else {
      tourInputZone.classList.add("hidden");
      currentTourName.textContent = current.tourName;
      clockTime.textContent = formatHMS(elapsedMs(current) / 1000);
      if (current.pausedAt) {
        clockStatus.textContent = "En pause";
        clockStatus.className = "clock-status paused";
        btnPause.textContent = "Reprendre";
        pauseTimeZone.classList.remove("hidden");
        pauseTime.textContent = formatMS((Date.now() - current.pausedAt) / 1000);
      } else {
        clockStatus.textContent = "En cours";
        clockStatus.className = "clock-status running";
        btnPause.textContent = "Pause";
        pauseTimeZone.classList.add("hidden");
      }
      btnStart.classList.add("hidden");
      btnPause.classList.remove("hidden");
      btnSwitch.classList.remove("hidden");
      btnStop.classList.remove("hidden");
    }
  }
  function startTicking() {
    if (tickInterval) clearInterval(tickInterval);
    tickInterval = setInterval(() => {
      if (current && !current.pausedAt) { clockTime.textContent = formatHMS(elapsedMs(current) / 1000); renderQuota(); }
      if (current && current.pausedAt) { pauseTime.textContent = formatMS((Date.now() - current.pausedAt) / 1000); }
    }, 1000);
  }
  function finalizeCurrentSession() {
    const sessions = loadSessions();
    const endTime = Date.now();
    const totalMs = elapsedMs(current);
    sessions.push({ id: current.id, tourName: current.tourName, start: current.start, end: endTime, durationMs: totalMs });
    saveSessions(sessions);
    return endTime;
  }
  function handleStart() {
    const name = tourNameInput.value.trim();
    if (!name) { tourNameInput.focus(); return; }
    rememberTourName(name);
    current = { id: "s_" + Date.now(), tourName: name, start: Date.now(), pausedAt: null, accumulatedPauseMs: 0 };
    saveCurrent(current);
    tourNameInput.value = "";
    render();
    renderHistory();
    renderQuota();
  }
  function handlePauseToggle() {
    if (!current) return;
    if (current.pausedAt) { current.accumulatedPauseMs = (current.accumulatedPauseMs || 0) + (Date.now() - current.pausedAt); current.pausedAt = null; }
    else { current.pausedAt = Date.now(); }
    saveCurrent(current);
    render();
  }
  function handleSwitch() { if (!current) return; switchInputZone.classList.remove("hidden"); switchNameInput.value = ""; switchNameInput.focus(); }
  function confirmSwitch() {
    if (!current) return;
    const cleanName = switchNameInput.value.trim();
    if (!cleanName) { switchNameInput.focus(); return; }
    if (current.pausedAt) { current.accumulatedPauseMs = (current.accumulatedPauseMs || 0) + (Date.now() - current.pausedAt); current.pausedAt = null; }
    finalizeCurrentSession();
    rememberTourName(cleanName);
    current = { id: "s_" + Date.now(), tourName: cleanName, start: Date.now(), pausedAt: null, accumulatedPauseMs: 0 };
    saveCurrent(current);
    switchInputZone.classList.add("hidden");
    render();
    renderHistory();
    renderQuota();
  }
  function handleStop() {
    if (!current) return;
    if (current.pausedAt) { current.accumulatedPauseMs = (current.accumulatedPauseMs || 0) + (Date.now() - current.pausedAt); current.pausedAt = null; }
    finalizeCurrentSession();
    current = null;
    saveCurrent(null);
    render();
    renderHistory();
    renderQuota();
  }
  btnStart.addEventListener("click", handleStart);
  btnPause.addEventListener("click", handlePauseToggle);
  btnSwitch.addEventListener("click", handleSwitch);
  btnStop.addEventListener("click", handleStop);
  btnConfirmSwitch.addEventListener("click", confirmSwitch);
  tourNameInput.addEventListener("keydown", e => { if (e.key === "Enter") handleStart(); });
  switchNameInput.addEventListener("keydown", e => { if (e.key === "Enter") confirmSwitch(); });
  btnSettings.addEventListener("click", openSettings);
  btnCloseSettings.addEventListener("click", closeSettings);
  btnSaveSettings.addEventListener("click", handleSaveSettings);
  btnAiMessage.addEventListener("click", handleAiMessage);
  btnCopyMessage.addEventListener("click", handleCopyMessage);
  btnCloseMessage.addEventListener("click", handleCloseMessage);
  btnRegenerateMessage.addEventListener("click", handleRegenerateMessage);
  btnAddSession.addEventListener("click", () => {
    editingSessionId = "new";
    renderHistory();
  });
  btnAssistant.addEventListener("click", openAssistantModal);
  btnAssistantClose.addEventListener("click", closeAssistantModal);
  btnAssistantReset.addEventListener("click", resetAssistantConversation);
  document.querySelectorAll(".assistant-contact-tab").forEach(tab => {
    tab.addEventListener("click", () => switchAssistantContact(tab.dataset.contact));
  });
  btnAssistantSend.addEventListener("click", handleAssistantSend);
  assistantInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      handleAssistantSend();
    }
  });
  assistantInput.addEventListener("input", () => {
    assistantInput.style.height = "auto";
    assistantInput.style.height = Math.min(assistantInput.scrollHeight, 100) + "px";
  });
  renderSuggestions();
  render();
  renderHistory();
  renderQuota();
  startTicking();
})();
</script>
<script>
  // Active le mode hors-ligne (PWA) : ce bloc est indépendant du reste de l'application.
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("service-worker.js").catch(() => {
        // Si l'enregistrement échoue (ex: ouverture en local sans https),
        // l'application continue de fonctionner normalement, juste sans mode hors-ligne.
      });
    });
  }
</script>
</body>
</html>
